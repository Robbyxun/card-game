<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大老二：正式版</title>
    <style>
        body { 
            background: #1a4d1a; background-image: radial-gradient(#2e7d32 20%, #1a4d1a 80%);
            color: white; font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; 
        }
        .game-header { margin-top: 20px; background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 20px; text-align: center; width: 80%; }
        #status { font-size: 1.2rem; font-weight: bold; color: #ffeb3b; }
        #pattern-tips { font-size: 1rem; color: #fff; margin-top: 5px; height: 1.2rem; background: rgba(255,255,255,0.1); border-radius: 5px; }

        .hand-container { position: absolute; bottom: 110px; left: 0; width: 100%; display: flex; justify-content: center; }
        .hand { display: flex; justify-content: center; --card-width: 75px; --card-height: 115px; }

        /* 卡片設計 */
        .card { 
            width: var(--card-width); height: var(--card-height); 
            background: white; border-radius: 8px; color: #333;
            display: flex; flex-direction: column; justify-content: space-between; padding: 10px; box-sizing: border-box;
            cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s; margin-left: -45px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.4); border: 1px solid #ccc;
        }
        .card.red { color: #d32f2f; }
        .card.selected { transform: translateY(-35px); box-shadow: 0 0 20px #ffeb3b; border: 2px solid #ffeb3b; }
        
        .card .rank-top { font-size: 1.4rem; font-weight: 900; line-height: 1; }
        .card .suit-center { font-size: 2.5rem; align-self: center; margin-top: -5px; }
        .card .rank-bottom { font-size: 1rem; font-weight: bold; align-self: flex-end; transform: rotate(180deg); }
        
        .controls { position: absolute; bottom: 35px; display: flex; gap: 20px; }
        button { padding: 12px 40px; font-size: 1.1rem; cursor: pointer; border-radius: 30px; border: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #playBtn { background: #fbc02d; color: #333; }
        #playBtn:disabled { background: #666; color: #999; opacity: 0.5; box-shadow: none; }
        #passBtn { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; }

        @media (max-width: 600px) {
            .hand { --card-width: 62px; --card-height: 95px; }
            .card { margin-left: -38px; padding: 6px; }
            .card .suit-center { font-size: 2rem; }
            .card .rank-top { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="game-header">
    <div id="status">準備中...</div>
    <div id="pattern-tips"></div>
</div>

<div class="hand-container">
    <div class="hand" id="playerHand"></div>
</div>

<div class="controls">
    <button id="playBtn" disabled>出牌</button>
    <button id="passBtn">Pass</button>
</div>
